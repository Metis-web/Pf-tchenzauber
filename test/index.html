<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- Primary Meta Tags -->
    <title>Pfötchenzauber e.V. | Tierschutzverein & Tiervermittlung</title>
    <meta name="title" content="Pfötchenzauber e.V. | Tierschutzverein & Tiervermittlung" />
    <meta name="description" content="Wir sind Pfötchenzauber e.V. - Ein engagierter Tierschutzverein. Geben Sie Hunden, Katzen und Kleintieren in Not ein neues, liebevolles Zuhause. Informieren Sie sich über Adoption, Pflegestellen und Spenden." />
    <meta name="keywords" content="Tierschutzverein, Tierheim, Hunde adoptieren, Katzen adoptieren, Tierschutz, Pfötchenzauber, Spenden, Tiere in Not, Tiervermittlung" />
    <meta name="author" content="Pfötchenzauber e.V." />
    <meta name="theme-color" content="#f97316" /> <!-- Brand color fallback -->
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pfoetchenzauber.org/" />
    <meta property="og:title" content="Pfötchenzauber e.V. | Tierschutzverein & Tiervermittlung" />
    <meta property="og:description" content="Wir helfen Tieren in Not. Entdecken Sie unsere Vermittlungstiere, unterstützen Sie uns mit Spenden oder werden Sie Pflegestelle." />
    <meta property="og:image" content="/social-preview.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://pfoetchenzauber.org/" />
    <meta property="twitter:title" content="Pfötchenzauber e.V. | Tierschutzverein" />
    <meta property="twitter:description" content="Tierschutz ist Herzenssache. Helfen Sie uns, Tieren in Not ein neues Zuhause zu geben." />
    <meta property="twitter:image" content="/social-preview.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <!-- Structured Data (JSON-LD) for SEO / Google Rich Snippets -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "NGO",
        "name": "Pfötchenzauber e.V.",
        "url": "https://pfoetchenzauber.org/",
        "logo": "https://pfoetchenzauber.org/logo.png",
        "description": "Engagierter Tierschutzverein für die Vermittlung und Rettung von Tieren in Not.",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "DE"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "availableLanguage": "German"
        }
      }
    </script>
    
    <style>
      /* Inline kritische CSS für den initialen Skeleton-Loader (Pre-rendering / CLS Prävention) */
      body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fafaf9; }
      .initial-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; color: #78716c; }
      .loader-spinner { width: 48px; height: 48px; border: 4px solid #f5f5f4; border-top-color: #f97316; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 24px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Fallback-Content für Suchmaschinen und Nutzer ohne JavaScript (SEO) -->
    <noscript>
      <div style="padding: 2rem; max-width: 800px; margin: 0 auto; line-height: 1.6;">
        <h1>Pfötchenzauber e.V. - Tierschutz</h1>
        <h2>Bitte aktivieren Sie JavaScript</h2>
        <p>
          Willkommen bei Pfötchenzauber e.V.! Um unsere vollständige Tiervermittlungs-Webapplikation 
          mit all ihren Funktionen (Suchfilter, interaktive Formulare, Echtzeit-Suchen) nutzen zu können, 
          muss JavaScript in Ihrem Browser aktiviert sein.
        </p>
        <p>
          Wir organisieren die Adoption von Tieren in Not. Werfen Sie einen Blick auf unsere 
          Hunde, Katzen und Kleintiere, die ein liebevolles Zuhause suchen. 
          Wenn Sie nicht adoptieren können, helfen auch Spenden oder die Bereitstellung als Pflegestelle sehr.
        </p>
        <ul>
          <li><a href="/tiere">Zu unseren Tieren</a></li>
          <li><a href="/spenden">Spenden & Helfen</a></li>
          <li><a href="/ueber-uns">Über unseren Verein</a></li>
          <li><a href="/kontakt">Kontakt aufnehmen</a></li>
        </ul>
      </div>
    </noscript>

    <!-- App Root mit Initial Skeleton / Pre-rendered Content -->
    <div id="root">
      <div class="initial-loader" aria-live="polite">
        <div class="loader-spinner"></div>
        <p>Pfötchenzauber wird geladen...</p>
        <p style="font-size: 0.875rem; color: #a8a29e; margin-top: 8px;">Wir bereiten die Seite für Sie vor.</p>
      </div>
    </div>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
